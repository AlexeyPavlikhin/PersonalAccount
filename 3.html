<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Демо: Аккордеон CSS без javascript и изображений</title>
    <style>
    ._body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
      color: #212529;
      text-align: left;
      background-color: #fff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    .accordion__item {
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 0.125rem 0.25rem rgb(0 0 0 / 15%);
    }

    .accordion__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      color: #fff;
      font-weight: 500;
      background-color: #0d6efd;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s ease-out;
    }

    /*
    ._accordion__header::after {
      flex-shrink: 0;
      width: 1.25rem;
      height: 1.25rem;
      margin-left: auto;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23ffffff'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-size: 1.25rem;
      content: "";
      transition: transform 0.2s ease-out;
    }

    ._accordion__item_show .accordion__header::after,
    ._accordion__item_slidedown .accordion__header::after {
      transform: rotate(-180deg);
    }

    ._accordion__header:hover {
      background-color: #0b5ed7;
    }
*/
    .accordion__item:not(.accordion__item) .accordion__header {
      border-bottom-right-radius: 10px;
      border-bottom-left-radius: 10px;
    }

    .accordion__content {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-bottom-right-radius: 10px;
      border-bottom-left-radius: 10px;
      
    }

    .accordion__content a {
      position: relative;
      display: block;
      padding: 0.5rem 1rem;
      color: #212529;
      text-decoration: none;
      background-color: #fff;
      border: 1px solid rgb(0 0 0 / 12.5%);
    }
/*
    ._accordion__content a:last-child {
      border-bottom-right-radius: inherit;
      border-bottom-left-radius: inherit;
    }
/*
    ._accordion__content a:hover {
      background-color: #f8f9fa;
    }
*/
    .-accordion__body {
      display: none;
    }

    /*
    ._accordion__item:not(.accordion__item_show) .accordion__body {
      display: none;

    */
    </style>

</head>
<body>
    <div id="accordion" class="accordion" style="max-width: 30rem; margin: 1rem auto;">
        <div class="accordion__item">
        <div class="accordion__header">
            Заголовок 1
        </div>
        <div class="accordion__body">
            <div class="accordion__content">
            <a href="#">Пункт 1.1</a>
            <a href="#">Пункт 1.2</a>
            <a href="#">Пункт 1.3</a>
            <a href="#">Пункт 1.4</a>

            </div>
        </div>
        </div>
        <div class="accordion__item">

        </div>
        </div>
        <div class="accordion__item">

        <div class="accordion__body">
            <div class="accordion__content">
