<VirtualHost *:80>
    ServerName _
    RewriteEngine On
    RewriteRule ^ https://msll-ip.ru%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName _
    DocumentRoot /var/www/msll-ip.ru

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/msll-ip.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/msll-ip.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    <Directory /var/www/msll-ip.ru>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/default-catchall-error.log
    CustomLog ${APACHE_LOG_DIR}/default-catchall-access.log combined
</VirtualHost>
</IfModule>
