<VirtualHost *:80>
    ServerName msll-lk.ru
    ServerAlias www.msll-lk.ru
    DocumentRoot /var/www/msll-lk.ru

    <Directory /var/www/msll-lk.ru>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/msll-lk-error.log
    CustomLog ${APACHE_LOG_DIR}/msll-lk-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName msll-lk.ru
    ServerAlias www.msll-lk.ru

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/msll-ip.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/msll-ip.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    RewriteEngine On
    RewriteRule ^ http://msll-lk.ru%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/msll-lk-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/msll-lk-ssl-access.log combined
</VirtualHost>
</IfModule>
