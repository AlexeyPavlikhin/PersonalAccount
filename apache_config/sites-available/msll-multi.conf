# Скопировать в /etc/apache2/sites-available/msll-multi.conf и включить: a2ensite msll-multi
#
# Порядок важен: первый VirtualHost на порту — «дефолт» для Host, который ни с кем не совпал.
# Для HTTPS на msll-lk.ru нужен валидный сертификат на это имя (отдельный выпуск или SAN
# вместе с msll-ip.ru). Если один fullchain на оба имени — укажите одинаковые пути в обоих :443 vhost.

<VirtualHost *:80>
    ServerName 000-msll-catchall-http
    Redirect permanent / https://msll-ip.ru/
</VirtualHost>

<VirtualHost *:80>
    ServerName msll-ip.ru
    Redirect permanent / https://msll-ip.ru/
</VirtualHost>

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/msll-ip.ru

    <Directory /var/www/msll-ip.ru>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:80>
    ServerName 127.0.0.1
    DocumentRoot /var/www/msll-ip.ru

    <Directory /var/www/msll-ip.ru>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:80>
    ServerName msll-lk.ru
    DocumentRoot /var/www/msll-lk.ru

    <Directory /var/www/msll-lk.ru>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName 000-msll-catchall-https
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/msll-ip.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/msll-ip.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Redirect permanent / https://msll-ip.ru/
</VirtualHost>

<VirtualHost *:443>
    ServerName msll-ip.ru
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/msll-ip.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/msll-ip.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    DocumentRoot /var/www/msll-ip.ru

    <Directory /var/www/msll-ip.ru>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName msll-lk.ru
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/msll-ip.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/msll-ip.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Redirect permanent / http://msll-lk.ru/
</VirtualHost>
